# docker-compose.yml — Development stack for the Verilog sandbox
# Includes:  FastAPI backend  +  sandbox image build target
#
# Usage:
#   docker compose up --build        # start everything
#   docker compose down              # stop and remove containers

version: "3.9"

services:

  # ── Sandbox image (build only — not a long-running service) ────────────────
  # We define it here so `docker compose build sandbox` rebuilds the image.
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      target: ""           # build all stages (final = production)
    image: verilog-sandbox:latest
    # No ports, no restart — this is launched per-request by the API
    profiles:
      - build-only          # excluded from default `compose up`

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api    # separate lightweight Python image
    image: verilog-api:latest
    ports:
      - "8000:8000"
    environment:
      - VERILOG_IMAGE=verilog-sandbox:latest
      - TIMEOUT_SECONDS=30
      - MEM_LIMIT=128m
      - CPU_QUOTA=50000
      - NETWORK_DISABLED=true
    volumes:
      # Mount the Docker socket so the API can spawn sibling containers
      # In production, use a Docker socket proxy (e.g. Tecnativa/docker-socket-proxy)
      # to restrict which Docker API calls the backend can make.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
